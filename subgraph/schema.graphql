type StakeEvent @entity {
  id: ID!
  user: Bytes!
  positionIndex: BigInt!
  planId: BigInt!
  amount: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
  timestamp: BigInt!
}

type ClaimEvent @entity {
  id: ID!
  user: Bytes!
  positionIndex: BigInt!
  amount: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
  timestamp: BigInt!
}

type UnstakeEvent @entity {
  id: ID!
  user: Bytes!
  positionIndex: BigInt!
  principal: BigInt!
  rewardPaid: BigInt!
  early: Boolean!
  penaltyAppliedOnRewards: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
  timestamp: BigInt!
}
