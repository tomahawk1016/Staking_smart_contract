specVersion: 0.0.5
description: Staking stake / claim / unstake indexer
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Staking
    network: mainnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: Staking
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - StakeEvent
        - ClaimEvent
        - UnstakeEvent
      abis:
        - name: Staking
          file: ./abis/Staking.json
      eventHandlers:
        - event: Staked(indexed address,indexed uint256,indexed uint256,uint256)
          handler: handleStaked
        - event: RewardClaimed(indexed address,indexed uint256,uint256)
          handler: handleRewardClaimed
        - event: Unstaked(indexed address,indexed uint256,uint256,uint256,bool,uint256)
          handler: handleUnstaked
      file: ./src/mapping.ts
